<script>
  const t = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.dataset.theme = t;
</script>

    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>

  </svg>
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
mermaid.initialize({ startOnLoad: false, theme: 'neutral', fontFamily: 'inherit' });
for (const pre of document.querySelectorAll('pre.mermaid, pre > code.language-mermaid')) {
  const node = pre.tagName === 'PRE' ? pre : pre.parentElement;
  const div = document.createElement('div');
  div.className = 'mermaid';
  div.textContent = node.textContent;
  node.replaceWith(div);
}
await mermaid.run();

const overlay = document.createElement('div');
overlay.className = 'diagram-overlay';
document.body.appendChild(overlay);
overlay.addEventListener('click', () => overlay.classList.remove('open'));
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') overlay.classList.remove('open');
});
for (const diagram of document.querySelectorAll('.mermaid')) {
  diagram.addEventListener('click', () => {
    const svg = diagram.querySelector('svg');
    if (!svg) return;
    overlay.innerHTML = '';
    overlay.appendChild(svg.cloneNode(true));
    overlay.classList.add('open');
  });
}

for (const img of document.querySelectorAll('article img')) {
  img.addEventListener('click', () => {
    overlay.innerHTML = '';
    const clone = img.cloneNode();
    clone.style.cssText = 'max-width:95vw;max-height:95vh;width:auto;height:auto;border-radius:6px;';
    overlay.appendChild(clone);
    overlay.classList.add('open');
  });
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('theme', next);
});
</script>
</body>
</html>
