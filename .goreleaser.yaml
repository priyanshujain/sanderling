version: 2

project_name: uatu

before:
  hooks:
    # The Go binary embeds the sidecar fat JAR via //go:embed gated by the
    # `withsidecar` build tag. Rebuild the JAR so the embed picks up the
    # fresh bytes that match this tag.
    - make sidecar

builds:
  - id: uatu
    main: ./cmd/uatu
    binary: uatu
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=withsidecar
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: uatu
    ids:
      - uatu
    formats: [tar.gz]
    name_template: "uatu_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: priyanshujain
    name: uatu
  draft: false
  prerelease: auto
