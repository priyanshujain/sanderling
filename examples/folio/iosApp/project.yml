name: iosApp
options:
  bundleIdPrefix: app.folio
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"

settings:
  base:
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_VERSION: "5.0"
    ONLY_ACTIVE_ARCH: YES
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - iosApp
    dependencies:
      - framework: ../app/shared/build/bin/iosSimulatorArm64/debugFramework/Shared.framework
        embed: false
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.folio
        PRODUCT_NAME: iosApp
        INFOPLIST_FILE: iosApp/Info.plist
        FRAMEWORK_SEARCH_PATHS:
          - $(SRCROOT)/../app/shared/build/bin/$(KOTLIN_FRAMEWORK_DIR)/debugFramework
        OTHER_LDFLAGS:
          - -ObjC
        KOTLIN_FRAMEWORK_DIR: iosSimulatorArm64
    preBuildScripts:
      - name: Build Kotlin framework
        script: |
          cd "$SRCROOT/.."
          ANDROID_HOME="${ANDROID_HOME:-$HOME/Library/Android/sdk}" \
            ./gradlew :app:shared:linkDebugFrameworkIosSimulatorArm64
        outputFiles:
          - $(SRCROOT)/../app/shared/build/bin/iosSimulatorArm64/debugFramework/Shared.framework/Shared
        basedOnDependencyAnalysis: false
