name: iosApp
options:
  bundleIdPrefix: dev.uatu.sample
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"

settings:
  base:
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_VERSION: "5.0"
    ONLY_ACTIVE_ARCH: YES
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - iosApp
    dependencies:
      - framework: ../composeApp/build/bin/iosSimulatorArm64/debugFramework/ComposeApp.framework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.uatu.sample
        PRODUCT_NAME: iosApp
        INFOPLIST_FILE: iosApp/Info.plist
        FRAMEWORK_SEARCH_PATHS:
          - $(SRCROOT)/../composeApp/build/bin/$(KOTLIN_FRAMEWORK_DIR)/debugFramework
        OTHER_LDFLAGS:
          - -ObjC
        KOTLIN_FRAMEWORK_DIR: iosSimulatorArm64
    preBuildScripts:
      - name: Build Kotlin framework
        script: |
          cd "$SRCROOT/.."
          ANDROID_HOME="${ANDROID_HOME:-$HOME/Library/Android/sdk}" \
            ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64
        outputFiles:
          - $(SRCROOT)/../composeApp/build/bin/iosSimulatorArm64/debugFramework/ComposeApp.framework/ComposeApp
        basedOnDependencyAnalysis: false
